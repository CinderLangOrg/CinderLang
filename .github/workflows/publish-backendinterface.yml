name: Publish BackendInterface NuGet

on:
  push:
    branches:
      - main
    paths:
      - 'BackendInterface/**'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BackendInterface

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: |
          VERSION=1.0.${{ github.run_number }}
          dotnet pack -p:PackageVersion=$VERSION --configuration Release --output ../nupkg

      - name: Publish to NuGet
        run: dotnet nuget push ../nupkg/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
